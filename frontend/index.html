<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客服助理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .chat-window {
      width: 420px; height: 680px; background: #fff;
      border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,.12);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #fff; padding: 18px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .avatar { width:42px;height:42px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px; }
    .header-info .name { font-weight:700;font-size:16px; }
    .header-info .status { font-size:12px;opacity:.85;display:flex;align-items:center;gap:5px;margin-top:2px; }
    .dot { width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block; }
    .messages { flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:14px; }
    .messages::-webkit-scrollbar{width:4px;} .messages::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:4px;}
    .msg { display:flex;gap:8px;align-items:flex-end;max-width:85%; }
    .msg.user { align-self:flex-end;flex-direction:row-reverse; }
    .msg.bot,.msg.agent { align-self:flex-start; }
    .msg-avatar { width:30px;height:30px;border-radius:50%;background:#dbeafe;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .msg.user .msg-avatar { background:#2563eb;color:#fff; }
    .msg.agent .msg-avatar { background:#7c3aed;color:#fff; }
    .bubble { padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap; }
    .msg.bot .bubble { background:#f1f5f9;color:#1e293b;border-bottom-left-radius:4px; }
    .msg.agent .bubble { background:#f3e8ff;color:#1e293b;border-bottom-left-radius:4px; }
    .msg.user .bubble { background:#2563eb;color:#fff;border-bottom-right-radius:4px; }
    .msg-label { font-size:10px;color:#94a3b8;margin-bottom:2px;padding:0 4px; }
    .typing .bubble { display:flex;gap:4px;align-items:center;padding:12px 16px; }
    .typing .bubble span { width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;animation:bounce 1.2s infinite ease-in-out; }
    .typing .bubble span:nth-child(2){animation-delay:.2s;} .typing .bubble span:nth-child(3){animation-delay:.4s;}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.6;}40%{transform:translateY(-6px);opacity:1;}}
    .agent-banner { background:#f3e8ff;color:#7c3aed;font-size:13px;padding:8px 16px;text-align:center;border-top:1px solid #e9d5ff; }
    .suggestions { padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px; }
    .chip { background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe;border-radius:999px;padding:5px 12px;font-size:12px;cursor:pointer;transition:background .15s; }
    .chip:hover{background:#dbeafe;}
    .quick-replies { display:flex;flex-wrap:wrap;gap:8px;padding:4px 16px 12px 52px; }
    .qr-btn { padding:8px 16px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #2563eb;color:#2563eb;background:#fff;transition:all .15s; }
    .qr-btn:hover { background:#2563eb;color:#fff; }
    .input-area { padding:12px 16px 16px;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:flex-end; }
    textarea { flex:1;resize:none;border:1.5px solid #e2e8f0;border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;max-height:120px;line-height:1.5;transition:border-color .2s; }
    textarea:focus{border-color:#2563eb;}
    button#send { width:42px;height:42px;border-radius:50%;background:#2563eb;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s; }
    button#send:hover{background:#1d4ed8;} button#send:disabled{background:#cbd5e1;cursor:default;}
    button#send svg{width:18px;height:18px;fill:#fff;}
    @media(max-width:480px){body{align-items:flex-end;}.chat-window{width:100%;height:100vh;border-radius:0;}}
  </style>
</head>
<body>
<div class="chat-window">
  <div class="header">
    <div class="avatar">🛍️</div>
    <div class="header-info">
      <div class="name" id="business-name">客服助理</div>
      <div class="status"><span class="dot"></span><span id="status-text">線上服務中</span></div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div id="agent-banner" class="agent-banner" style="display:none">👤 真人客服已接手，請稍候回覆</div>
  <div class="suggestions" id="suggestions">
    <span class="chip" onclick="sendMsg(this.textContent)">列出所有商品</span>
    <span class="chip" onclick="sendMsg(this.textContent)">列出所有服務</span>
    <span class="chip" onclick="sendMsg(this.textContent)">我要下單</span>
    <span class="chip" onclick="sendMsg(this.textContent)">營業時間？</span>
  </div>
  <div class="input-area">
    <textarea id="input" placeholder="輸入問題…" rows="1"></textarea>
    <button id="send" onclick="submitInput()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
  let sessionId = localStorage.getItem('sb_session') || 'new';
  let ws = null;
  let isWaiting = false;
  let agentMode = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const agentBanner = document.getElementById('agent-banner');

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/chat/${sessionId}`);

    ws.onopen = () => {
      fetch('/health').then(r=>r.json()).then(d=>{
        document.getElementById('business-name').textContent = d.business || '客服助理';
      }).catch(()=>{});
    };

    ws.onmessage = (e) => {
      const evt = JSON.parse(e.data);
      if (evt.type === 'session_id') {
        sessionId = evt.value;
        localStorage.setItem('sb_session', sessionId);
      } else if (evt.type === 'stream_token') {
        removeTyping();
        appendMsg('bot', evt.value);
        setWaiting(false);
      } else if (evt.type === 'stream_end') {
        if (evt.buttons && evt.buttons.length) showQuickReplies(evt.buttons);
      } else if (evt.type === 'agent_message') {
        removeTyping();
        if (evt.message_type === 'image') {
          appendImg('agent', evt.media_url, evt.content);
        } else {
          appendMsg('agent', evt.content);
        }
        setWaiting(false);
      } else if (evt.type === 'agent_mode') {
        agentMode = true;
        agentBanner.style.display = 'block';
        document.getElementById('status-text').textContent = '真人客服中';
      }
    };

    ws.onclose = () => {
      setTimeout(connect, 2000); // 自動重連
    };
  }

  window.addEventListener('DOMContentLoaded', () => {
    connect();
    appendMsg('bot', '您好！我是客服助理，有任何關於商品價格或服務的問題，歡迎直接詢問 😊');
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitInput(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  function appendImg(role, url, caption) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    wrap.innerHTML = `<div class="msg-avatar">${role==='user'?'👤':'👤'}</div>
      <div class="bubble" style="padding:6px;background:${role==='user'?'#2563eb':'#f3e8ff'}">
        <img src="${url}" style="max-width:200px;border-radius:8px;display:block"/>
        ${caption ? `<div style="font-size:12px;margin-top:4px;color:${role==='user'?'#fff':'#1e293b'}">${escHtml(caption)}</div>` : ''}
      </div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendMsg(role, text) {
    const icons = { bot: '🤖', agent: '👤', user: '👤' };
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    if (role === 'agent') {
      wrap.innerHTML = `<div class="msg-avatar" style="background:#7c3aed;color:#fff">👤</div><div><div class="msg-label">客服人員</div><div class="bubble">${escHtml(text)}</div></div>`;
    } else {
      wrap.innerHTML = `<div class="msg-avatar">${role==='user'?'👤':'🤖'}</div><div class="bubble">${escHtml(text)}</div>`;
    }
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendTyping() {
    removeTyping();
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing'; wrap.id = 'typing';
    wrap.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  function setWaiting(v) {
    isWaiting = v;
    sendBtn.disabled = v;
    inputEl.disabled = v;
  }

  function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function showQuickReplies(buttons) {
    removeQuickReplies();
    const wrap = document.createElement('div');
    wrap.className = 'quick-replies'; wrap.id = 'quick-replies';
    buttons.forEach(label => {
      const btn = document.createElement('button');
      btn.className = 'qr-btn';
      btn.textContent = label;
      btn.onclick = () => { removeQuickReplies(); sendMsg(label); };
      wrap.appendChild(btn);
    });
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeQuickReplies() { document.getElementById('quick-replies')?.remove(); }

  function sendMsg(text) {
    if (!text.trim() || isWaiting || !ws || ws.readyState !== WebSocket.OPEN) return;
    removeQuickReplies();
    appendMsg('user', text);
    document.getElementById('suggestions').style.display = 'none';
    if (!agentMode) {
      setWaiting(true);
      appendTyping();
    }
    ws.send(JSON.stringify({ text }));
  }

  function submitInput() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendMsg(text);
  }
</script>
</body>
</html>
